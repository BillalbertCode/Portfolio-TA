name: Deploy Validation Checks
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Build & Quality Verification
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint -- --max-warnings=10
        timeout-minutes: 2

      - name: Setup Playwright Browsers
        run: npx playwright install --with-deps chromium
        timeout-minutes: 2

      - name: Run Functionality Tests (Playwright)
        run: npm run test
        timeout-minutes: 10
        env:
          CI: true
